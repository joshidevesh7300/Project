apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: student-portal
  name: student-portal
spec:
  replicas: 2
  selector:
    matchLabels:
      app: student-portal
  template:
    metadata:
      labels:
        app: student-portal
    spec:
      containers:
       - name: student-portal
         image: student-portal:v1
         ports:
           - containerPort: 5000
